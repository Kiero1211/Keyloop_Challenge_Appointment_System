openapi: 3.0.3
info:
  title: User Access Control API Contract
  version: 0.1.0
  description: Contract changes for replacing Customer ownership with User ownership and enforcing role-scoped tenant views.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /appointments:
    get:
      summary: List appointments visible to the signed-in user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Scope'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Optional elevated-role filter. TenantUser requests ignore this and use the signed-in user.
        - name: status
          in: query
          schema:
            type: string
        - name: technicianId
          in: query
          schema:
            type: string
            format: uuid
        - name: serviceBayId
          in: query
          schema:
            type: string
            format: uuid
        - name: vehicleId
          in: query
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Role-scoped appointment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointments'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create an appointment with User ownership
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '202':
          description: Appointment command accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Selected user, vehicle, technician, or service bay is invalid for the active tenant or role
  /appointments/active:
    get:
      summary: List active cached appointments visible to the signed-in user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Scope'
      responses:
        '200':
          description: Role-scoped active appointment list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /appointments/{id}:
    get:
      summary: Get an appointment if visible to the signed-in user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Appointment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /vehicles:
    get:
      summary: List vehicles visible to the signed-in user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Scope'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Optional elevated-role filter. TenantUser requests ignore this and use the signed-in user.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Role-scoped vehicle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVehicles'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create a vehicle with User ownership
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleRequest'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Selected user is invalid for the active tenant or role
  /vehicles/{id}:
    get:
      summary: Get a vehicle if visible to the signed-in user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /tenants:
    get:
      summary: List tenants for Admin tenant selection
      responses:
        '200':
          description: Admin-visible tenants
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users:
    get:
      summary: List users in a tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Tenant users visible to TenantManager or Admin
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantUser'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Add a user to the active tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId:
                  type: string
                  format: uuid
                role:
                  type: string
                  enum: [TenantUser, TenantManager]
      responses:
        '204':
          description: User assigned to the active tenant
        '403':
          $ref: '#/components/responses/Forbidden'
  /users/{userId}/role:
    put:
      summary: Promote a tenant user to a tenant manager
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [TenantManager]
      responses:
        '204':
          description: User role updated within the active tenant
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Active tenant context. Admin must select a tenant before dashboard requests.
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Scope:
      name: scope
      in: query
      required: false
      schema:
        type: string
        enum: [mine, tenant]
        default: mine
      description: TenantUser is always treated as mine. TenantManager/Admin may request mine or tenant.
  responses:
    BadRequest:
      description: Invalid request shape
    Unauthorized:
      description: Missing or invalid authentication
    Forbidden:
      description: Authenticated user is not allowed to access this tenant, role scope, or record
    NotFound:
      description: Record does not exist or is not visible to the signed-in user
  schemas:
    CreateAppointmentRequest:
      type: object
      required: [vehicleId, serviceTypeId, desiredStartTime, autoAssigned]
      properties:
        userId:
          type: string
          format: uuid
          description: Required for TenantManager/Admin. Ignored or rejected for TenantUser when it differs from the signed-in user.
        vehicleId:
          type: string
          format: uuid
        serviceTypeId:
          type: string
          format: uuid
        desiredStartTime:
          type: string
          format: date-time
        autoAssigned:
          type: boolean
          default: false
        technicianId:
          type: string
          format: uuid
        serviceBayId:
          type: string
          format: uuid
    CreateAppointmentResponse:
      type: object
      required: [commandId, partition]
      properties:
        commandId:
          type: string
          format: uuid
        partition:
          type: integer
    Appointment:
      type: object
      required: [id, tenantId, userId, vehicleId, serviceTypeId, status, scheduledStartTime, scheduledEndTime]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        serviceTypeId:
          type: string
          format: uuid
        technicianId:
          type: string
          format: uuid
        serviceBayId:
          type: string
          format: uuid
        scheduledStartTime:
          type: string
          format: date-time
        scheduledEndTime:
          type: string
          format: date-time
        status:
          type: string
        notes:
          type: string
          nullable: true
    AppointmentDetail:
      allOf:
        - $ref: '#/components/schemas/Appointment'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/TenantUser'
            vehicle:
              $ref: '#/components/schemas/Vehicle'
    PaginatedAppointments:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    CreateVehicleRequest:
      type: object
      required: [vin, licensePlate, make, model, year]
      properties:
        userId:
          type: string
          format: uuid
          description: Required for TenantManager/Admin when creating for another user. TenantUser is assigned automatically to the signed-in user.
        vin:
          type: string
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
    Vehicle:
      type: object
      required: [id, tenantId, userId, make, model, year]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        vin:
          type: string
          nullable: true
        licensePlate:
          type: string
          nullable: true
        make:
          type: string
        model:
          type: string
        year:
          type: integer
    PaginatedVehicles:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    Tenant:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
    TenantUser:
      type: object
      required: [id, email, firstName, lastName, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [TenantUser, TenantManager, Admin]
        isActive:
          type: boolean
