openapi: "3.1.0"
info:
  title: Appointment API Service
  version: "1.0.0"
  description: |
    High-throughput ingestion layer for appointment booking commands.
    Validates payloads, guards against duplicate submissions via Redis hash existence,
    and routes commands deterministically to Redis Stream partitions.
  contact:
    name: Keyloop Engineering

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /api/v1/appointments:
    post:
      tags: [Appointments]
      summary: Create an appointment via async CQRS ingestion
      description: |
        Asynchronously creates an appointment. Returns 202 Accepted.
        Uses Redis streams for high-throughput ingestion.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  commandId:
                    type: string
                    format: uuid
                  partition:
                    type: integer
        "409":
          description: Conflict (e.g. invalid or missing hold)
        "400":
          description: Validation error

  /appointments/hold:
    parameters:
      - $ref: '#/components/parameters/XTenantId'
    post:
      tags: [Appointments]
      summary: Create a temporary hold for a technician and service bay
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                technicianId:
                  type: string
                serviceBayId:
                  type: string
      responses:
        "201":
          description: Hold created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  holdId:
                    type: string
                    format: uuid
                  expiresAt:
                    type: string
                    format: date-time
        "409":
          description: The selected technician or service bay is currently held by another user

  /health:
    get:
      operationId: healthCheck
      summary: Health check — verifies Redis connectivity
      responses:
        "200":
          description: Service and Redis are healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthOkResponse'
              example:
                status: "ok"
        "503":
          description: Redis is unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthErrorResponse'
              example:
                status: "error"
                reason: "redis_unavailable"

components:
  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    AppointmentCreateRequest:
      type: object
      required: [customerId, vehicleId, serviceTypeId, technicianId, serviceBayId, desiredStartTime]
      properties:
        holdId:
          type: string
          format: uuid
          description: Optional hold ID to claim a temporary slot hold
        customerId:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        serviceTypeId:
          type: string
          format: uuid
        technicianId:
          type: string
          format: uuid
        serviceBayId:
          type: string
          format: uuid
        desiredStartTime:
          type: string
          format: date-time
          description: Must be a valid ISO 8601 datetime

    ValidationErrorResponse:
      type: object
      required:
        - status
        - error
        - details
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Validation failed"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    ConflictErrorResponse:
      type: object
      required:
        - status
        - error
        - vehicleId
      properties:
        status:
          type: integer
          example: 409
        error:
          type: string
          example: "Appointment already pending"
        vehicleId:
          type: string
          format: uuid

    ServiceErrorResponse:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: integer
          example: 503
        error:
          type: string
          example: "Service temporarily unavailable"

    HealthOkResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]

    HealthErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        reason:
          type: string
          example: "redis_unavailable"
