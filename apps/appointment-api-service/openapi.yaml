  # ── Appointments ─────────────────────────────────────────────────────────────
  /appointments:
    parameters:
      - $ref: '#/components/parameters/XTenantId'
    get:
      tags: [Appointments]
      summary: List appointments with optional filters
      security:
        - BearerAuth: []
      parameters:
        - { name: date, in: query, schema: { type: string, format: date }, description: "Filter by date (YYYY-MM-DD) — matches start_time" }
        - { name: startTime, in: query, schema: { type: string, format: date-time }, description: "Filter by exact start time or multi-day range start" }
        - { name: endTime, in: query, schema: { type: string, format: date-time }, description: "Filter by exact end time or multi-day range end" }
        - { name: status, in: query, schema: { type: string, enum: [Scheduled, InProgress, Completed, Cancelled, Failed] } }
        - { name: technicianId, in: query, schema: { type: string, format: uuid } }
        - { name: serviceBayId, in: query, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AppointmentResponse' } }
                  total: { type: integer }
                  page: { type: integer }
                  pageSize: { type: integer }
    post:
      tags: [Appointments]
      summary: Create an appointment via async CQRS ingestion
      description: |
        Asynchronously creates an appointment. Returns 202 Accepted.
        Uses Redis streams for high-throughput ingestion.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  commandId:
                    type: string
                    format: uuid
                  partition:
                    type: integer
        "409":
          description: Conflict (e.g. invalid or missing hold)
        "400":
          description: Validation error

  /appointments/hold:
    parameters:
      - $ref: '#/components/parameters/XTenantId'
    post:
      tags: [Appointments]
      summary: Create a temporary hold for a technician and service bay
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                technicianId:
                  type: string
                serviceBayId:
                  type: string
      responses:
        "201":
          description: Hold created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  holdId:
                    type: string
                    format: uuid
                  expiresAt:
                    type: string
                    format: date-time
        "409":
          description: The selected technician or service bay is currently held by another user

  /appointments/{id}:
    parameters:
      - $ref: '#/components/parameters/XTenantId'
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Appointments]
      summary: Get an appointment by ID (with enriched details)
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AppointmentResponse'
                  - type: object
                    properties:
                      customer:
                        type: object
                        properties:
                          firstName: { type: string }
                          lastName: { type: string }
                      vehicle:
                        type: object
                        properties:
                          licensePlate: { type: string }
                          make: { type: string }
                          model: { type: string }
                          year: { type: integer }
                      serviceType:
                        type: object
                        properties:
                          name: { type: string }
                      technician:
                        type: object
                        properties:
                          firstName: { type: string }
                          lastName: { type: string }
                      serviceBay:
                        type: object
                        properties:
                          name: { type: string }
        "403": { description: Appointment belongs to a different tenant }
        "404": { description: Appointment not found }
    patch:
      tags: [Appointments]
      summary: Update appointment status or notes
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentUpdateRequest'
      responses:
        "200": { content: { application/json: { schema: { $ref: '#/components/schemas/AppointmentResponse' } } } }
        "422": { description: Invalid status transition }
    delete:
      tags: [Appointments]
      summary: Cancel (soft-delete) an appointment
      security:
        - BearerAuth: []
      responses:
        "204": { description: Appointment cancelled }
        "422": { description: Appointment is already COMPLETED and cannot be cancelled }
