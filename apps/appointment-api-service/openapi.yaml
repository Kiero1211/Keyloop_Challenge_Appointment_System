openapi: 3.0.3
info:
  title: Keyloop Appointment API
  version: 1.0.0
  description: >
    Public API contract for the multi-tenant appointment scheduler. This contract
    combines the base multi-tenant API, realtime booking endpoints, audit log
    access, and the current User ownership model from the user access control
    specification.
servers:
  - url: http://localhost:3000
    description: Local API service

tags:
  - name: Health
  - name: Auth
  - name: Tenants
  - name: Users
  - name: ServiceTypes
  - name: Technicians
  - name: ServiceBays
  - name: Vehicles
  - name: Appointments
  - name: AuditLogs

paths:
  /health:
    get:
      tags: [Health]
      summary: Check API and dependency health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: One or more dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Access token refreshed
          content:
            application/json:
              schema:
                type: object
                required: [accessToken]
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/switch-tenant:
    post:
      tags: [Auth]
      summary: Switch the active tenant context
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchTenantRequest'
      responses:
        '200':
          description: Tenant switched and new token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwitchTenantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/auth/tenants:
    get:
      tags: [Auth]
      summary: List tenants for the signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserTenant'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      description: Admin-only tenant list used for tenant selection.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTenants'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Tenants]
      summary: Create a tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/tenants/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Tenants]
      summary: Get a tenant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Tenants]
      summary: Update a tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tenants]
      summary: Deactivate a tenant
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Tenant deactivated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users in the active tenant
      description: TenantManager and Admin only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Tenant users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Assign a user to the active tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTenantUserRequest'
      responses:
        '204':
          description: User assigned
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userId}/role:
    put:
      tags: [Users]
      summary: Update a tenant user's role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantUserRoleRequest'
      responses:
        '204':
          description: User role updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/service-types:
    get:
      tags: [ServiceTypes]
      summary: List service types
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Service type list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedServiceTypes'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [ServiceTypes]
      summary: Create a service type
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceTypeRequest'
      responses:
        '201':
          description: Service type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/service-types/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [ServiceTypes]
      summary: Get a service type
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Service type detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceType'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [ServiceTypes]
      summary: Update a service type
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceTypeUpdateRequest'
      responses:
        '200':
          description: Service type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceType'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ServiceTypes]
      summary: Delete a service type
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Service type deleted
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/technicians:
    get:
      tags: [Technicians]
      summary: List technicians or available technicians
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
          description: When paired with endTime, returns available technicians.
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
        - name: serviceTypeId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Technician list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PaginatedTechnicians'
                  - type: array
                    items:
                      $ref: '#/components/schemas/Technician'
    post:
      tags: [Technicians]
      summary: Create a technician
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TechnicianRequest'
      responses:
        '201':
          description: Technician created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Technician'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/technicians/{id}/occupied:
    get:
      tags: [Technicians]
      summary: Get occupied time windows for a technician
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/Date'
      responses:
        '200':
          description: Technician occupied slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TechnicianOccupiedSlots'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/technicians/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Technicians]
      summary: Get a technician
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Technician detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Technician'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Technicians]
      summary: Update a technician
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TechnicianUpdateRequest'
      responses:
        '200':
          description: Technician updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Technician'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Technicians]
      summary: Delete a technician
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Technician deleted

  /api/v1/technicians/{id}/skills:
    post:
      tags: [Technicians]
      summary: Add a service skill to a technician
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TechnicianSkillRequest'
      responses:
        '201':
          description: Skill assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TechnicianSkill'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/technicians/{id}/skills/{serviceTypeId}:
    delete:
      tags: [Technicians]
      summary: Remove a service skill from a technician
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
        - name: serviceTypeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Skill removed

  /api/v1/service-bays:
    get:
      tags: [ServiceBays]
      summary: List service bays or available service bays
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
          description: When paired with endTime, returns available service bays.
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Service bay list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PaginatedServiceBays'
                  - type: array
                    items:
                      $ref: '#/components/schemas/ServiceBay'
    post:
      tags: [ServiceBays]
      summary: Create a service bay
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceBayRequest'
      responses:
        '201':
          description: Service bay created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceBay'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/service-bays/{id}/occupied:
    get:
      tags: [ServiceBays]
      summary: Get occupied time windows for a service bay
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/Date'
      responses:
        '200':
          description: Service bay occupied slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceBayOccupiedSlots'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/service-bays/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [ServiceBays]
      summary: Get a service bay
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Service bay detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceBay'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [ServiceBays]
      summary: Update a service bay
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceBayUpdateRequest'
      responses:
        '200':
          description: Service bay updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceBay'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ServiceBays]
      summary: Delete a service bay
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Service bay deleted

  /api/v1/vehicles:
    get:
      tags: [Vehicles]
      summary: List vehicles visible to the signed-in user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Scope'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Optional elevated-role filter. TenantUser requests use the signed-in user.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Vehicle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVehicles'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Vehicles]
      summary: Create a vehicle with User ownership
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/vehicles/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Vehicles]
      summary: Get a vehicle if visible to the signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Vehicles]
      summary: Update a vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleUpdateRequest'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Vehicles]
      summary: Delete a vehicle
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Vehicle deleted

  /api/v1/appointments:
    get:
      tags: [Appointments]
      summary: List appointments visible to the signed-in user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Scope'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Optional elevated-role filter. TenantUser requests use the signed-in user.
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
            enum: [Pending, Scheduled, InProgress, Completed, Cancelled, Failed]
        - name: technicianId
          in: query
          schema:
            type: string
            format: uuid
        - name: serviceBayId
          in: query
          schema:
            type: string
            format: uuid
        - name: vehicleId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Appointment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointments'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Appointments]
      summary: Create an appointment with User ownership
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '202':
          description: Appointment command accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/appointments/hold:
    post:
      tags: [Appointments]
      summary: Create a temporary resource hold
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHoldRequest'
      responses:
        '201':
          description: Hold created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHoldResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/appointments/active:
    get:
      tags: [Appointments]
      summary: List active cached appointments visible to the signed-in user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Scope'
      responses:
        '200':
          description: Active appointment cache entries
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/appointments/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Appointments]
      summary: Get an appointment if visible to the signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Appointments]
      summary: Cancel an appointment
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/appointments/{id}/status:
    patch:
      tags: [Appointments]
      summary: Update appointment status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppointmentStatusRequest'
      responses:
        '200':
          description: Appointment status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/audit-logs:
    get:
      tags: [AuditLogs]
      summary: Query audit logs
      description: Admin-only; audit log reads bypass the Redis read-through cache.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: start_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogs'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantHeader:
      name: x-tenant-id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Active tenant context.
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Scope:
      name: scope
      in: query
      required: false
      schema:
        type: string
        enum: [mine, tenant]
        default: tenant
      description: TenantUser requests are treated as mine. TenantManager/Admin may request mine or tenant.
    Date:
      name: date
      in: query
      required: false
      schema:
        type: string
        format: date

  responses:
    BadRequest:
      description: Invalid request shape
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user is not allowed to access this tenant, role scope, or record
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Record does not exist or is not visible
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with existing state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request is valid JSON but violates business rules
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, error]
        reason:
          type: string

    PaginationMeta:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        tenantId:
          type: string
          format: uuid

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    SwitchTenantRequest:
      type: object
      required: [targetTenantId, refreshToken]
      properties:
        targetTenantId:
          type: string
          format: uuid
        refreshToken:
          type: string

    SwitchTenantResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tenantId:
          type: string
          format: uuid

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
        currentTenant:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/UserTenant'
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/UserTenant'
        hasMultipleTenants:
          type: boolean

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [Guest, TenantUser, TenantManager, Admin]
        isSuperAdmin:
          type: boolean

    UserTenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        role:
          type: string
          enum: [Guest, TenantUser, TenantManager, Admin]
        permissions:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    TenantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    TenantUpdateRequest:
      type: object
      properties:
        name:
          type: string

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedTenants:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Tenant'

    TenantUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [Guest, TenantUser, TenantManager, Admin]
        isActive:
          type: boolean

    AssignTenantUserRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [TenantUser, TenantManager]
          default: TenantUser

    UpdateTenantUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [TenantManager]

    ServiceTypeRequest:
      type: object
      required: [name, estimatedDurationMinutes]
      properties:
        name:
          type: string
        estimatedDurationMinutes:
          type: integer
          minimum: 1

    ServiceTypeUpdateRequest:
      type: object
      properties:
        name:
          type: string
        estimatedDurationMinutes:
          type: integer
          minimum: 1

    ServiceType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        estimatedDurationMinutes:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedServiceTypes:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ServiceType'

    TechnicianRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email

    TechnicianUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email

    Technician:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        isActive:
          type: boolean
        skills:
          type: array
          items:
            $ref: '#/components/schemas/TechnicianSkill'

    PaginatedTechnicians:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Technician'

    TechnicianSkillRequest:
      type: object
      required: [serviceTypeId]
      properties:
        serviceTypeId:
          type: string
          format: uuid

    TechnicianSkill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        technicianId:
          type: string
          format: uuid
        serviceTypeId:
          type: string
          format: uuid

    ServiceBayRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    ServiceBayUpdateRequest:
      type: object
      properties:
        name:
          type: string

    ServiceBay:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedServiceBays:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ServiceBay'

    VehicleRequest:
      type: object
      required: [userId, licensePlate, make, model, year]
      properties:
        userId:
          type: string
          format: uuid
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
          minimum: 1900
        color:
          type: string

    VehicleUpdateRequest:
      type: object
      properties:
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
          minimum: 1900
        color:
          type: string

    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedVehicles:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Vehicle'

    CreateAppointmentRequest:
      type: object
      required: [vehicleId, serviceTypeId, desiredStartTime, autoAssigned]
      properties:
        userId:
          type: string
          format: uuid
          description: Required for elevated users creating appointments for another user.
        vehicleId:
          type: string
          format: uuid
        serviceTypeId:
          type: string
          format: uuid
        desiredStartTime:
          type: string
          format: date-time
        autoAssigned:
          type: boolean
          default: false
        technicianId:
          type: string
          format: uuid
        serviceBayId:
          type: string
          format: uuid

    CreateAppointmentResponse:
      type: object
      required: [commandId, partition]
      properties:
        commandId:
          type: string
          format: uuid
        partition:
          type: integer

    UpdateAppointmentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Scheduled, InProgress, Completed, Cancelled]

    Appointment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        serviceTypeId:
          type: string
          format: uuid
        technicianId:
          type: string
          format: uuid
          nullable: true
        serviceBayId:
          type: string
          format: uuid
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        scheduledStartTime:
          type: string
          format: date-time
        scheduledEndTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [Pending, Scheduled, InProgress, Completed, Cancelled, Failed]
        notes:
          type: string
          nullable: true
        actualStartTime:
          type: string
          format: date-time
          nullable: true
        actualEndTime:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppointmentDetail:
      allOf:
        - $ref: '#/components/schemas/Appointment'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/TenantUser'
            vehicle:
              $ref: '#/components/schemas/Vehicle'
            serviceType:
              $ref: '#/components/schemas/ServiceType'
            technician:
              $ref: '#/components/schemas/Technician'
            serviceBay:
              $ref: '#/components/schemas/ServiceBay'

    PaginatedAppointments:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Appointment'

    CreateHoldRequest:
      type: object
      properties:
        technicianId:
          type: string
          format: uuid
        serviceBayId:
          type: string
          format: uuid
      description: At least one of technicianId or serviceBayId is required.

    CreateHoldResponse:
      type: object
      required: [holdId, expiresAt]
      properties:
        holdId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time

    OccupiedSlot:
      type: object
      required: [appointmentId, startTime, endTime]
      properties:
        appointmentId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time

    TechnicianOccupiedSlots:
      type: object
      required: [technicianId, occupiedSlots]
      properties:
        technicianId:
          type: string
          format: uuid
        occupiedSlots:
          type: array
          items:
            $ref: '#/components/schemas/OccupiedSlot'

    ServiceBayOccupiedSlots:
      type: object
      required: [serviceBayId, occupiedSlots]
      properties:
        serviceBayId:
          type: string
          format: uuid
        occupiedSlots:
          type: array
          items:
            $ref: '#/components/schemas/OccupiedSlot'

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        entityType:
          type: string
        entityId:
          type: string
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE]
        result:
          type: object
        createdAt:
          type: string
          format: date-time

    PaginatedAuditLogs:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AuditLog'

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        meta:
          $ref: '#/components/schemas/PaginationMeta'
