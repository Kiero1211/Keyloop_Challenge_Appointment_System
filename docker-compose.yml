version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  appointment-api-service:
    build:
      context: ./apps/appointment-api-service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - STREAM_PARTITION_COUNT=4
    depends_on:
      - redis
