version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=appointments
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appointments"]
      interval: 5s
      timeout: 5s
      retries: 5

  appointment-api-service:
    build:
      context: ./apps/appointment-api-service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - STREAM_PARTITION_COUNT=4
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/appointments?schema=public
      - JWT_SECRET=supersecret123
      - JWT_ACCESS_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d
    depends_on:
      - redis
      - postgres

  appointment-worker-service:
    build:
      context: ./apps/appointment-worker-service
    environment:
      - REDIS_CONNECTION=redis:6379
      - DB_CONNECTION=Host=postgres;Database=appointments;Username=postgres;Password=postgres
    depends_on:
      - redis

  api-client-ui:
    build:
      context: .
      dockerfile: ./apps/api-client-ui/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - appointment-api-service
